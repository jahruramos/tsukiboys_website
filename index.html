<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSUKIBOYS</title>
  <link rel="icon" href="assets/finder.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Fixed 1920x1080 stage, scaled to fit viewport -->
  <div id="stage">
    <!-- Wallpaper -->
    <video id="wallpaper" autoplay muted loop playsinline draggable="false"><source src="assets/0714.mp4" type="video/mp4" /></video>

    <!-- ===== Menu Bar ===== -->
    <div id="menubar">
      <div class="mb-left">
        <div class="mb-menu mb-apple" data-menu="apple">
          <img src="assets/apple.svg" alt="Apple" draggable="false" />
        </div>
        <div class="mb-menu mb-bold" data-menu="finder">TSUKIBOYS</div>
        <div class="mb-menu" data-menu="file">File</div>
        <div class="mb-menu" data-menu="edit">Edit</div>
        <div class="mb-menu" data-menu="view">View</div>
        <div class="mb-menu" data-menu="go">Go</div>
        <div class="mb-menu" data-menu="window">Window</div>
        <div class="mb-menu" data-menu="help">Help</div>
      </div>
      <div id="notch">
        <div id="notch-embed">
          <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/6JuN8VSuQIBpcRzFZKrK5r?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
        </div>
      </div>
      <div class="mb-right">
        <div id="now-playing" class="mb-icon hidden">
          <img src="assets/play.circle.svg" alt="Now Playing" draggable="false" />
        </div>
        <div class="mb-icon"><img src="assets/battery.75percent.svg" alt="Battery" draggable="false" /></div>
        <div class="mb-icon mb-control"><img src="assets/switch.2.svg" alt="Control Center" draggable="false" /></div>
        <div class="mb-icon"><img src="assets/magnifyingglass.svg" alt="Spotlight" draggable="false" /></div>
        <div class="mb-icon"><img src="assets/wifi.slash.svg" alt="Wi-Fi" draggable="false" /></div>
        <div class="mb-item" id="mb-date">Mon Jun 22</div>
        <div class="mb-item" id="mb-clock">9:41 AM</div>
      </div>
    </div>

    <!-- ===== Now Playing popup ===== -->
    <div id="now-popup" class="hidden">
      <div class="np-row">
        <div class="np-art"><img src="assets/wav-icon.png" alt="" /></div>
        <div class="np-info">
          <div class="np-song"></div>
          <div class="np-controls">
            <input type="range" class="np-seek" min="0" max="1000" value="0" />
            <button class="np-btn np-pause" type="button"><img class="ql-icon" src="assets/pause.fill.svg" alt="" /></button>
            <button class="np-btn np-forward" type="button"><img class="ql-icon" src="assets/forward.fill.svg" alt="" /></button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Desktop icons ===== -->
    <div id="desktop-icons"></div>

    <!-- ===== Windows layer (populated by JS) ===== -->
    <div id="windows"></div>

    <!-- ===== Dock ===== -->
    <div id="dock-wrap">
      <div id="dock"></div>
    </div>
  </div>

  <!-- Menu dropdown layer -->
  <div id="menu-dropdown" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
